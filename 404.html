<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var host = window.location.hostname;
        var path = window.location.pathname;
        var search = window.location.search;
        var hash = window.location.hash;

        // যদি ভিজিটর পুরনো ডোমেইন বা ডিফল্ট গিটহাব ইউআরএল এ আসে
        if (host === "mdmoinulhasan.pro.bd" || host === "moinulhasan.github.io") {
          window.location.replace("https://moinulhasan.pro.bd" + path + search + hash);
        } else {
          // অন্য কোনো ক্ষেত্রে হোমপেজে পাঠিয়ে দেওয়া
          window.location.replace("/");
        }
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="https://moinulhasan.pro.bd">moinulhasan.pro.bd</a>...</p>
  </body>
</html>
